{% extends "base.html" %}
{% block content %}
<h3>Categorías</h3>
<a href="{{ url_for('categoria.crear') }}" class="btn btn-success mb-2">Nueva Categoría</a>
<form method="GET" class="mb-3">
    <input type="text" name="busqueda" value="{{ busqueda }}" class="form-control" placeholder="Buscar categoría">
</form>
<table class="table table-bordered">
    <thead><tr><th>ID</th><th>Nombre</th><th>Acciones</th></tr></thead>
    <tbody>
        {% for categoria in categorias %}
        <tr>
            <td>{{ categoria.id }}</td>
            <td>{{ categoria.nombre }}</td>
            <td>
                <a href="{{ url_for('categoria.editar', id=categoria.id) }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{{ url_for('categoria.eliminar', id=categoria.id) }}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
