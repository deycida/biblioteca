{% extends "base.html" %}
{% block content %}
<h3>{% if form.nombre.data %}Editar Categoría{% else %}Crear Categoría{% endif %}</h3>
<form method="POST">
    {{ form.hidden_tag() }}
    <div class="mb-3">{{ form.nombre.label }} {{ form.nombre(class="form-control") }}</div>
    {{ form.submit(class="btn btn-primary") }}
</form>
{% endblock %}
