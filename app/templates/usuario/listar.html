{% extends "base.html" %}
{% block content %}
<h3>Usuarios</h3>
<a href="{{ url_for('usuario.crear') }}" class="btn btn-success mb-2">Nuevo Usuario</a>
<form method="GET" class="mb-3">
    <input type="text" name="busqueda" value="{{ busqueda }}" class="form-control" placeholder="Buscar usuario">
</form>
<table class="table table-bordered">
    <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Acciones</th></tr></thead>
    <tbody>
        {% for usuario in usuarios %}
        <tr>
            <td>{{ usuario.id }}</td>
            <td>{{ usuario.nombre }}</td>
            <td>{{ usuario.email }}</td>
            <td>{{ usuario.rol }}</td>
            <td>
                <a href="{{ url_for('usuario.editar', id=usuario.id) }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{{ url_for('usuario.eliminar', id=usuario.id) }}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
