{% extends "base.html" %}
{% block content %}
<h3>Libros</h3>
<a href="{{ url_for('libro.crear') }}" class="btn btn-success mb-2">Nuevo Libro</a>
<form method="GET" class="mb-3">
    <input type="text" name="busqueda" value="{{ busqueda }}" class="form-control" placeholder="Buscar libro">
</form>
<table class="table table-bordered">
    <thead><tr><th>ID</th><th>Título</th><th>Autor</th><th>Categoría</th><th>Acciones</th></tr></thead>
    <tbody>
        {% for libro in libros %}
        <tr>
            <td>{{ libro.id }}</td>
            <td>{{ libro.titulo }}</td>
            <td>{{ libro.autor }}</td>
            <td>{{ libro.categoria.nombre }}</td>
            <td>
                <a href="{{ url_for('libro.editar', id=libro.id) }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{{ url_for('libro.eliminar', id=libro.id) }}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
